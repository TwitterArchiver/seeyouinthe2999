name: 首次建档

on:
  workflow_dispatch:
    inputs:
      since:
        description: '从指定日期开始抓取 (YYYYMMDD，留空则全量)'
        required: false
        default: ''

jobs:
  setup:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取账号信息
        id: info
        run: |
          U=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          OWNER=$(echo "${{ github.repository }}" | cut -d'/' -f1)
          PAGES_URL="https://${OWNER}.github.io/${U}/"
          echo "username=$U"         >> $GITHUB_OUTPUT
          echo "owner=$OWNER"        >> $GITHUB_OUTPUT
          echo "pages_url=$PAGES_URL" >> $GITHUB_OUTPUT
          echo "✅ 账号：@${U}  Pages：${PAGES_URL}"

      - name: 安装依赖
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新脚本与模板
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" \
            -o /tmp/archive.py
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/index.html" \
            -o index.html || true
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/.nojekyll" \
            -o .nojekyll || touch .nojekyll
          echo "✅ archive.py ($(wc -l < /tmp/archive.py) 行)"

      - name: 替换 index.html 中的账号名
        run: |
          U=${{ steps.info.outputs.username }}
          sed -i "s/const ACCOUNTS_HARDCODED = \[.*\]/const ACCOUNTS_HARDCODED = ['${U}']/" index.html || true

      - name: 建立目录结构
        run: |
          U=${{ steps.info.outputs.username }}
          mkdir -p accounts/${U}/wayback_snapshots/{html,json,image,video,avatar,_log}
          if [ ! -f "accounts/${U}/wayback_snapshots/profile.json" ]; then
            echo "{\"name\":\"\",\"username\":\"@${U}\",\"avatar\":\"avatar/avatar.jpg\",\"banner\":\"avatar/1500x500.jpg\"}" \
              > accounts/${U}/wayback_snapshots/profile.json
          fi

      - name: fetch-cdx
        run: |
          U=${{ steps.info.outputs.username }}
          SINCE="${{ github.event.inputs.since }}"
          cd accounts/${U}
          if [ -n "$SINCE" ]; then
            python3 /tmp/archive.py fetch-cdx "$U" --from "$SINCE"
          else
            python3 /tmp/archive.py fetch-cdx "$U"
          fi

      # ── 第一阶段：HTML + 纯文字版先上线 ───────────────────────────────────
      - name: fetch-html
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py fetch-html || true

      - name: build-index（第一阶段）
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py build-index

      - name: 生成 README
        run: |
          U=${{ steps.info.outputs.username }}
          OWNER=${{ steps.info.outputs.owner }}
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/README.template.md" \
            -o README.md 2>/dev/null || echo "# ${U} 的推文存档" > README.md
          sed -i "s/{USERNAME}/${U}/g; s/{OWNER}/${OWNER}/g" README.md

      - name: 推送第一阶段（纯文字版上线）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then
              echo "⚠️ 跳过超大文件 ($(( size / 1048576 ))MB): $f"
              git rm --cached "$f"
            fi
          done
          git diff --cached --quiet && echo "无新内容" && exit 0
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🗂️ 首次建档 HTML: ${{ steps.info.outputs.username }} (+${COUNT} 文件) [skip ci]"
          git push
          echo "✅ 第一阶段推送完成"

      - name: 开启 GitHub Pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo '{"source":{"branch":"main","path":"/"}}' | \
            gh api repos/${{ github.repository }}/pages \
            --method POST --input - 2>/dev/null || \
          echo '{"source":{"branch":"main","path":"/"}}' | \
            gh api repos/${{ github.repository }}/pages \
            --method PUT --input - || true

      - name: 设置仓库 Homepage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh repo edit "${{ github.repository }}" \
            --homepage "${{ steps.info.outputs.pages_url }}" || true

      # ── 第二阶段：媒体版 ────────────────────────────────────────────────────
      - name: fetch-media
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py fetch-media || true

      - name: clean-html
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py clean-html || true

      - name: build-index（第二阶段）
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py build-index

      - name: 推送第二阶段（媒体版上线）
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then
              echo "⚠️ 跳过超大文件 ($(( size / 1048576 ))MB): $f"
              git rm --cached "$f"
            fi
          done
          if git diff --cached --quiet; then
            echo "✅ 无新媒体文件"
            exit 0
          fi
          COUNT=$(git diff --cached --numstat | wc -l)
          git commit -m "🖼️ 首次建档 媒体: ${{ steps.info.outputs.username }} (+${COUNT} 文件) [skip ci]"
          git push
          echo "✅ 第二阶段推送完成"
          echo "🔗 ${{ steps.info.outputs.pages_url }}"
