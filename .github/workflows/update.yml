name: 增量更新

on:
  schedule:
    - cron: '0 2 * * 0'   # 每周日 UTC 02:00（北京时间周日 10:00）
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取账号信息
        id: info
        run: |
          U=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "username=$U" >> $GITHUB_OUTPUT
          echo "✅ 账号：@${U}"

      - name: 检查数据目录
        id: check
        run: |
          U=${{ steps.info.outputs.username }}
          if [ -d "accounts/${U}/wayback_snapshots" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true"  >> $GITHUB_OUTPUT
            echo "⚠️ 数据目录不存在，请先运行首次建档"
          fi

      - name: 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新 archive.py
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" \
            -o /tmp/archive.py
          echo "✅ archive.py ($(wc -l < /tmp/archive.py) 行)"

      - name: fetch-cdx（增量）
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py fetch-cdx "${{ steps.info.outputs.username }}"

      - name: fetch-html（增量）
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py fetch-html || true

      - name: fetch-media（增量）
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py fetch-media || true

      - name: retry --image-failed
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --image-failed || true

      - name: retry --video-failed
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --video-failed || true

      - name: retry --avatar-failed
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --avatar-failed || true

      - name: clean-html --force（更新新下载的媒体路径）
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py clean-html --force || true

      - name: build-index
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py build-index

      - name: 推送增量内容
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then
              echo "⚠️ 跳过超大文件 ($(( size / 1048576 ))MB): $f"
              git rm --cached "$f"
            fi
          done
          if git diff --cached --quiet; then
            echo "✅ 本周无新内容"
            exit 0
          fi
          COUNT=$(git diff --cached --numstat | wc -l)
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "🔄 增量更新: ${{ steps.info.outputs.username }} (+${COUNT} 文件) ${DATE} [skip ci]"
          git push
          echo "✅ 增量推送完成，新增 ${COUNT} 个文件"
