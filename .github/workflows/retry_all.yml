name: 全量重试

on:
  workflow_dispatch:

jobs:
  retry-all:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: 检出仓库
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 读取账号信息
        id: info
        run: |
          U=$(echo "${{ github.repository }}" | cut -d'/' -f2)
          echo "username=$U" >> $GITHUB_OUTPUT
          echo "✅ 账号：@${U}"

      - name: 检查数据目录
        id: check
        run: |
          U=${{ steps.info.outputs.username }}
          if [ -d "accounts/${U}/wayback_snapshots" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true"  >> $GITHUB_OUTPUT
            echo "⚠️ 数据目录不存在，请先运行首次建档"
          fi

      - name: 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: pip install requests beautifulsoup4 lxml

      - name: 拉取最新 archive.py
        if: steps.check.outputs.skip == 'false'
        run: |
          curl -fsSL "https://raw.githubusercontent.com/sjshb57/Test/main/archive.py" \
            -o /tmp/archive.py
          echo "✅ archive.py ($(wc -l < /tmp/archive.py) 行)"

      - name: retry --image-failed-all
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --image-failed-all || true

      - name: retry --video-failed-all
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --video-failed-all || true

      - name: retry --avatar-failed-all
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py retry --avatar-failed-all || true

      - name: clean-html --force（更新新下载的媒体路径）
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py clean-html --force || true

      - name: build-index
        if: steps.check.outputs.skip == 'false'
        run: |
          cd accounts/${{ steps.info.outputs.username }}
          python3 /tmp/archive.py build-index

      - name: 推送结果
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --name-only | while IFS= read -r f; do
            [ -f "$f" ] || continue
            size=$(stat -c%s "$f" 2>/dev/null || echo 0)
            if [ "$size" -gt 104857600 ]; then
              echo "⚠️ 跳过超大文件 ($(( size / 1048576 ))MB): $f"
              git rm --cached "$f"
            fi
          done
          if git diff --cached --quiet; then
            echo "✅ 无新内容"
            exit 0
          fi
          COUNT=$(git diff --cached --numstat | wc -l)
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "🔁 全量重试: ${{ steps.info.outputs.username }} (+${COUNT} 文件) ${DATE} [skip ci]"
          git push
          echo "✅ 推送完成，新增 ${COUNT} 个文件"
